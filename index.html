<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRENCH BISTRO</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="#" style="text-decoration: none;">Home</a></li>
                <li><a href="#" style="text-decoration: none;">Menu</a></li>
                <li><a href="#" style="text-decoration: none;">About</a></li>
                <li><a href="#" style="text-decoration: none;">Contact</a></li>
            </ul>
        </nav>
        <div class="banner">
            <p>
                LA LUNE FRENCH BISTRO
            </p>
            <h1>
                A TASTE OF PARIS
            </h1>
            <button>
                <a href="#" style="text-decoration: none; color: #000; font: 1000;">Dine with us</a>
            </button>
        </div>
    </header>
    <main>
        <div class="hours">
            <i class="fa-solid fa-star-of-life"></i>
            <h2 style="font-size: 24px; font-weight: bold;">
                HOURS
            </h2>
            <h1>
                Weekdays: 11:00am - 10:00pm
            </h1>
            <h1>
                Weekends: 9:00am - 11:00pm
            </h1>
            <h1>
                Closed on public days
            </h1>
            <i class="fa-solid fa-star-of-life"></i>
        </div>
        <div class="menu">

        </div>
    </main>
    <footer>
        <div class="menu">
            <div class="text">
                <h1>
                    FLAVORS OF FRANCE
                </h1>
                <button>
                    <a href="#" style="text-decoration: none; color: #000; font: 1000;">View full menu</a>
                </button>
            </div>
            <div class="card-container">
                <div class="card">
                    <img src="mouthwatering appetizers.png" alt="" class="card-img">
                    <div class="card-content">
                    </div>
                </div>
                <div class="card">
                    <img src="Wholesome mains.png" alt="" class="card-img">
                    <div class="card-content">
                    </div>
                </div>
                <div class="card">
                    <img src="sweet ending.png" alt="" class="card-img">
                    <div class="card-content">
                    </div>
                </div>
            </div>
        </div>
    </footer>
</body>
<script src="https://kit.fontawesome.com/6ee66e4bdd.js" crossorigin="anonymous"></script>

</html>
